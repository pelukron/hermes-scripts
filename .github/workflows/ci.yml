name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Python
        run: uv python install 3.11

      - name: Install deps
        run: uv sync

      - name: Changelog check
        if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]' && github.actor != 'github-actions[bot]' && !startsWith(github.head_ref, 'dependabot/') && !startsWith(github.head_ref, 'github-actions/')
        run: |
          MERGE_BASE=$(git merge-base origin/main HEAD 2>/dev/null || echo origin/main)
          git diff --name-only "$MERGE_BASE" HEAD | grep -q "^CHANGELOG.md$" && echo "✅ CHANGELOG.md actualizado en este PR" || {
            echo "❌ CHANGELOG.md NO fue modificado en este PR"
            echo ""
            echo "   Todo cambio debe reflejarse en CHANGELOG.md."
            echo "   Usa: bin/bump-and-pr.sh para actualizarlo automáticamente."
            exit 1
          }

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy src/

      - name: Security scan (Bandit)
        run: uv run bandit -c pyproject.toml -r src/ -ll

      - name: Tests
        run: uv run pytest -v

  notify:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notificar Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="${{ needs.test.result }}"
          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"
            TEXT="CI pasó: ${{ github.repository }}%0A%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.sha }}"
          else
            EMOJI="❌"
            TEXT="CI falló: ${{ github.repository }}%0A%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.sha }}%0AURL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${EMOJI} ${TEXT}" \
            -d "parse_mode=HTML"